name: 최저가 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (UTC 00:00) 실행
  workflow_dispatch: {}    # 수동으로도 실행 가능 (Actions 탭 -> Run workflow)
  push:
    branches: [ main ]
    paths:
      - 'products.config.json'   # 상품/쿠팡가격 수정 후 push하면 즉시 재실행

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 네이버 최저가 조회 및 prices.json 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node scripts/update-prices.mjs

      - name: 변경사항 커밋 및 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --quiet --cached || git commit -m "chore: 최저가 자동 업데이트 $(date -u +'%Y-%m-%d')"
          git push
